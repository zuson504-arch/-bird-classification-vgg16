<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <title>AvianAI - Bird Classification</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .navbar {
            background: white;
            border-bottom: 1px solid #eee;
        }

        .nav-link {
            color: #555 !important;
            font-weight: 500;
        }

        .nav-link.active {
            color: #2563eb !important;
            font-weight: 600;
        }

        .btn-primary {
            background: #2563eb;
            border: none;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        footer {
            margin-top: 60px;
            padding: 30px;
            text-align: center;
            color: #888;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg px-4">
        <a class="navbar-brand fw-bold text-primary" href="/">AvianAI</a>

        <div class="ms-auto">
            <a class="nav-link d-inline" href="/">Home</a>
            <a class="nav-link d-inline" href="/predict">Predict</a>
            <a class="nav-link d-inline" href="/about">About</a>
        </div>
    </nav>

    <!-- CONTENT AREA -->
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- FOOTER -->
    <footer>
        © 2026 AvianAI - Bird Classification using VGG16 Transfer Learning
    </footer>
    <script src="{{ url_for('static', filename='main.js') }}"></script>

</body>

</html>
